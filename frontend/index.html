<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartFinance – Đăng Nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #6868e5; --primary-light: #6464ed;
  --primary-glow: rgba(79,70,229,0.3);
  --secondary: #22C55E; --danger: #EF4444;
  --bg: #0B0F1A; --card: #161D2F; --bg3: #1C2333;
  --border: rgba(255,255,255,0.08); --text: #F0F4FF;
  --text2: #94A3B8; --text3: #64748B;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Be Vietnam Pro', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  background-image: radial-gradient(ellipse at 20% 50%, rgba(79,70,229,0.08) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(34,197,94,0.05) 0%, transparent 50%);
}
.auth-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 24px; padding: 40px; width: 100%; max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; justify-content: center; }
.logo-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--primary); display: flex; align-items: center; justify-content: center;
  font-size: 24px; box-shadow: 0 0 20px var(--primary-glow);
}
.logo-name { font-size: 22px; font-weight: 800; }
.logo-sub { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
.tab {
  flex: 1; padding: 10px; text-align: center;
  border-radius: 9px; cursor: pointer; font-size: 14px; font-weight: 600;
  transition: all .2s; color: var(--text3); border: none; background: transparent; font-family: inherit;
}
.tab.active { background: var(--primary); color: #fff; box-shadow: 0 2px 10px var(--primary-glow); }
.form-group { margin-bottom: 18px; }
label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
input {
  width: 100%; padding: 13px 16px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text); font-family: inherit; font-size: 14px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
input::placeholder { color: var(--text3); }
input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
.btn-submit {
  width: 100%; padding: 14px;
  background: var(--primary); color: #fff;
  border: none; border-radius: 12px; font-family: inherit;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all .2s; margin-top: 8px;
  box-shadow: 0 4px 20px var(--primary-glow);
}
.btn-submit:hover { background: var(--primary-light); transform: translateY(-1px); }
.btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.alert {
  padding: 12px 16px; border-radius: 10px; font-size: 13px;
  margin-bottom: 16px; display: none;
}
.alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; }
.alert.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86EFAC; }
.divider { text-align: center; color: var(--text3); font-size: 12px; margin: 20px 0; position: relative; }
.divider::before, .divider::after {
  content:''; position: absolute; top: 50%; width: 40%; height: 1px;
  background: var(--border);
}
.divider::before { left: 0; } .divider::after { right: 0; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div>
      <div class="logo-name">SmartFinance</div>
      <div class="logo-sub">Quản Lý Tài Chính</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Đăng Nhập</button>
    <button class="tab" onclick="switchTab('register')">Đăng Ký</button>
  </div>

  <div id="alert" class="alert"></div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="email@example.com">
    </div>
    <div class="form-group">
      <label>Mật Khẩu</label>
      <input type="password" id="loginPassword" placeholder="Nhập mật khẩu">
    </div>
    <button class="btn-submit" onclick="handleLogin()">Đăng Nhập</button>
  </div>

  <!-- Register Form -->
  <div id="registerForm" style="display:none">
    <div class="form-group">
      <label>Họ và Tên</label>
      <input type="text" id="regName" placeholder="Nguyễn Văn A">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="email@example.com">
    </div>
    <div class="form-group">
      <label>Mật Khẩu</label>
      <input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự">
    </div>
    <button class="btn-submit" onclick="handleRegister()">Tạo Tài Khoản</button>
  </div>
</div>

<script>
const API = '/api';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  hideAlert();
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alert');
  el.textContent = msg; el.className = `alert ${type}`; el.style.display = 'block';
}
function hideAlert() { document.getElementById('alert').style.display = 'none'; }

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return showAlert('Vui lòng nhập đầy đủ thông tin');
  const btn = document.querySelector('#loginForm .btn-submit');
  btn.disabled = true; btn.textContent = 'Đang xử lý...';
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!data.success) return showAlert(data.message);
    localStorage.setItem('sf_token', data.token);
    localStorage.setItem('sf_user', JSON.stringify(data.user));
    showAlert('Đăng nhập thành công! Đang chuyển hướng...', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch {
    showAlert('Không thể kết nối server. Vui lòng thử lại.');
  } finally { btn.disabled = false; btn.textContent = 'Đăng Nhập'; }
}

async function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!name || !email || !password) return showAlert('Vui lòng nhập đầy đủ thông tin');
  const btn = document.querySelector('#registerForm .btn-submit');
  btn.disabled = true; btn.textContent = 'Đang xử lý...';
  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!data.success) return showAlert(data.message);
    localStorage.setItem('sf_token', data.token);
    localStorage.setItem('sf_user', JSON.stringify(data.user));
    showAlert('Đăng ký thành công!', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch {
    showAlert('Không thể kết nối server. Vui lòng thử lại.');
  } finally { btn.disabled = false; btn.textContent = 'Tạo Tài Khoản'; }
}

// Nếu đã đăng nhập thì redirect thẳng
if (localStorage.getItem('sf_token')) window.location.href = 'dashboard.html';

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const activeForm = document.getElementById('loginForm').style.display !== 'none' ? 'login' : 'register';
    activeForm === 'login' ? handleLogin() : handleRegister();
  }
});
</script>
</body>
</html>
